services:
  vscode:
    image: lscr.io/linuxserver/code-server:latest
    container_name: dev-center-vscode
    environment:
      # UID/GID of the user that owns the workspace on the host.
      # Run `id -u` and `id -g` to get your values (default: 1000/1000).
      - PUID=1000
      - PGID=1000
      # Timezone for the container clock.
      - TZ=${VSCODE_TZ:-Europe/Paris}
      # Password to access VS Code in the browser.
      - PASSWORD=${VSCODE_PASSWORD}
      # Directory opened by default when VS Code starts.
      - DEFAULT_WORKSPACE=/workspace
    volumes:
      # Mount the host workspace directory into the container.
      - ${WORKSPACE_DIR}:/workspace
    ports:
      # Expose VS Code Server on the configured host port.
      - "${VSCODE_PORT:-8443}:8443"
    restart: unless-stopped
