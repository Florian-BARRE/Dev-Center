# dev-center — Production Docker Compose
#
# Setup:
#   cp services/dev-center-app/.env.example services/dev-center-app/.env
#   cp services/vscode/.env.example services/vscode/.env
#   cp services/common/.env.example services/common/.env
#   docker compose --env-file services/common/.env up -d --build
#
# The --env-file flag loads services/common/.env for variable interpolation.

services:
  dev-center-app:
    # FastAPI backend + React dashboard + session manager.
    build:
      context: src
      dockerfile: dev_center_app/Dockerfile
    image: dev-center-app:latest
    restart: unless-stopped
    ports:
      # Bind the API + UI port; override DEV_CENTER_PORT in services/common/.env.
      - "${DEV_CENTER_PORT:-8000}:8000"
    env_file:
      # App environment variables (logging levels, paths, etc.)
      - services/dev-center-app/.env
    volumes:
      # Project workspace storage — shared read-write with code-server.
      - ${DATA_ROOT}/workspaces:/workspaces
      # Persistent state: projects.json, global-config.json, global-rules.md.
      - ${DATA_ROOT}/data:/data
      # Claude CLI credentials — read-write so token refreshes persist to host.
      # Mounted at /root/.claude because HOME=/root inside the container.
      # Claude Code reads credentials from $HOME/.claude by default.
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
      # SSH key for git clone operations (optional; defaults to ~/.ssh).
      # Mounted at /root/.ssh so git finds keys when HOME=/root.
      - ${SSH_KEY_PATH:-~/.ssh}:/root/.ssh:ro
      # Docker socket — gives Claude Code sessions access to the host Docker
      # daemon so they can spawn containers (docker run, docker compose, etc.).
      # Security note: access to this socket is equivalent to root on the host.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Override HOME to a clean Linux path.
      # Docker Desktop on Windows injects HOME=/c/Users/<user> (Git Bash format)
      # which breaks git path resolution and credential prompts inside the container.
      - HOME=/root
      # Path configuration injected at runtime.
      - DATA_DIR=/data
      - WORKSPACES_DIR=/workspaces
      - CLAUDE_DIR=/root/.claude
    networks:
      - dev-center-net

  code-server:
    # VS Code in the browser — file browsing for project workspaces.
    image: codercom/code-server:latest
    restart: unless-stopped
    ports:
      # Bind the VS Code browser port; override CODE_SERVER_PORT in services/common/.env.
      - "${CODE_SERVER_PORT:-8443}:8080"
    env_file:
      # VS Code server environment (optional password auth).
      - services/vscode/.env
    volumes:
      # Same workspace volume as dev-center-app so files are visible in the editor.
      - ${DATA_ROOT}/workspaces:/workspaces
    networks:
      - dev-center-net
    entrypoint: ["/bin/sh", "-c"]
    # Start with password auth if PASSWORD is set; otherwise no auth.
    command: ['if [ -n "$$PASSWORD" ]; then exec code-server --auth password /workspaces; else exec code-server --auth none /workspaces; fi']

networks:
  dev-center-net:
    # Bridge network isolates the dev-center services from the host.
    driver: bridge
