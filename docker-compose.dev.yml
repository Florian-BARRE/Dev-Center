# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Mounts source code into the container and enables uvicorn hot reload.
# All other service config is inherited from docker-compose.yml.

services:
  dev-center-app:
    volumes:
      # Overlay the Docker build copy with the live source tree for hot reload.
      - ./src/dev_center_app:/app/dev_center_app
    environment:
      # Enable DEV_MODE early logger in runtime_config.py.
      - DEV_MODE=true
      # Include full tracebacks in API error responses.
      - FASTAPI_DEBUG_MODE=true
    # Override the production CMD with uvicorn hot reload.
    command: >
      uvicorn dev_center_app.entrypoint:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/dev_center_app
