# Development overrides for IA-Dev-Hub.
#
# Usage:
#   docker compose --env-file services/common/.env \
#     -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# For local dev, set IDH_DATA_ROOT=./dev_data in services/common/.env.
# All runtime data (config, workspaces, state, rules) will be created
# under ./dev_data/ so you can inspect it directly from the project folder.
#
# This file only overrides what differs from production:
#   - Source code mount for live-reload (no rebuild needed after edits)
#   - Debug environment variables

services:
  idh-app:
    # Mount source code directly so edits are reflected without rebuilding.
    # The Dockerfile image is still used for the Python venv.
    volumes:
      - ./src/idh-app:/app/idh-app
    environment:
      # Enable uvicorn --reload (detected via DEV_MODE in the container)
      - DEV_MODE=true
      # Override FastAPI and logging defaults for verbose local development.
      # These take precedence over values in services/idh-plugin/.env.
      - FASTAPI_DEBUG_MODE=true
      - LOGGING_CONSOLE_LEVEL=DEBUG
