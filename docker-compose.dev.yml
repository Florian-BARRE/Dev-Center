# Development overrides.
#
# Usage:
#   docker compose --env-file services/common/.env \
#     -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Goal:
# - Backend: hot reload with source bind mount.
# - Frontend: dedicated Vite dev server on a separate host port.
# - API calls from frontend are proxied to backend via Vite proxy.

services:
  dev-center-app:
    # Use the dedicated dev target to avoid building production frontend assets.
    build:
      target: dev-runtime

    # Overlay built backend files with live source for uvicorn --reload.
    volumes:
      - ./src/dev_center_app:/app/dev_center_app

    environment:
      # Enables extra runtime startup logs for local debugging.
      DEV_MODE: "true"
      # FastAPI debug responses are useful in local development only.
      FASTAPI_DEBUG_MODE: "true"
      # Frontend dev server runs on a different origin; allow it explicitly.
      CORS_ALLOWED_ORIGINS: "http://localhost:${FRONTEND_PORT:-5173},http://127.0.0.1:${FRONTEND_PORT:-5173}"

    # Enable backend hot reload.
    command: >
      uvicorn dev_center_app.entrypoint:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/dev_center_app

  dev-center-frontend:
    # Dedicated frontend dev container running Vite with HMR.
    container_name: dev-center-frontend
    build:
      context: ./src
      dockerfile: dev_center_app/frontend/Dockerfile.dev
    image: dev-center-frontend:dev
    restart: unless-stopped

    depends_on:
      dev-center-app:
        condition: service_started

    ports:
      # Host port for React/Vite dev server (separate from backend port).
      - "${FRONTEND_PORT:-5173}:5173"

    environment:
      # Target backend service inside the Compose network.
      VITE_API_TARGET: http://dev-center-app:8000
      # Useful on Docker Desktop when file watching is unreliable.
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-false}"

    volumes:
      # Live frontend source mount for instant HMR updates.
      - ./src/dev_center_app/frontend:/workspace/frontend
      # Keep node_modules inside a Docker volume for speed and OS compatibility.
      - dev-center-frontend-node-modules:/workspace/frontend/node_modules

    networks:
      - dev-center-net

volumes:
  dev-center-frontend-node-modules:
